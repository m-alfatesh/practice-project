name: Notify New Releases Only

on:
  push:
    branches:
      - main
    paths:
      - 'releases/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find and send only new files
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- releases/)
          for FILE in $NEW_FILES; do
            curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$FILE" \
            -F caption="🚀 ملف جديد: $(basename "$FILE")" \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
          done
